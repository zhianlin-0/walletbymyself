<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Zhian's 💰</title>
    
    <meta property="og:title" content="Zhian's 🫧 ⭐️ 🪞">
    <meta property="og:description" content="認真賺錢，謹慎花錢，多多存錢，快樂玩耍！☀️∞">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/papercut/180/000000/sparkling-diamond.png?v=3">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-ocean: #1a5f7a;
            --sunny-amber: #f7b05b;
            --sand-beach: #f7f9fa;
            --foam-white: #ffffff;
            --sea-shadow: #226f8d1c;
            --text-dark: #2c3e50;
            --text-muted: #7f8c8d;
        }
        
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: "HanziPen TC", "翩翩體-繁", "Songti TC", "BiauKai", "Caveat", "Chalkboard SE", 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent; 
        }
        
        body { background-color: var(--sand-beach); color: var(--text-dark); padding-bottom: 70px; overflow-x: hidden; }
        header { background: linear-gradient(135deg, var(--primary-ocean), #2d8bb1); color: var(--foam-white); padding: 18px 15px; text-align: center; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; box-shadow: 0 4px 12px var(--sea-shadow); position: relative; }
        header h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: 1.5px; margin-bottom: 3px; }
        header p { font-size: 0.78rem; font-weight: 300; opacity: 0.85; letter-spacing: 0.5px; }
        .container { max-width: 600px; margin: 0 auto; padding: 12px 14px; }
        
        .balance-card { 
            background: var(--foam-white); border-radius: 14px; padding: 12px 15px; margin-bottom: 16px; 
            box-shadow: 0 4px 15px var(--sea-shadow); border: 1px solid rgba(26, 95, 122, 0.04);
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .balance-card h3 { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; margin-bottom: 6px; letter-spacing: 0.5px; }
        .main-total-display { font-size: 1.55rem; font-weight: 700; color: var(--primary-ocean); margin-top: 2px; letter-spacing: 0.5px; }

        .privacy-toggle-btn {
            background: #f1f5f9; color: var(--primary-ocean); border: 1px solid #e2e8f0;
            padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: 700;
            cursor: pointer; transition: all 0.2s; margin-bottom: 4px; display: inline-flex; align-items: center; gap: 3px;
        }
        .privacy-toggle-btn:active { background: #e2e8f0; transform: scale(0.97); }

        .app-view { display: none; }
        .app-view.active { display: block; animation: slideIn 0.3s ease-out; }

        .main-sector-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 8px; }
        .sector-cube-btn {
            background: var(--foam-white); border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px 12px;
            display: flex; flex-direction: column; justify-content: space-between; align-items: flex-start;
            min-height: 85px; cursor: pointer; box-shadow: 0 3px 8px rgba(34, 111, 141, 0.03); transition: all 0.2s ease;
        }
        .sector-cube-btn:active { transform: scale(0.97); background-color: #f8fafc; }
        .cube-icon-title { display: flex; flex-direction: column; gap: 3px; }
        .cube-icon { font-size: 1.15rem; }
        .cube-title { font-size: 0.82rem; font-weight: 700; color: var(--text-dark); }
        .cube-footer { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
        .cube-amount { font-size: 0.95rem; font-weight: 700; color: var(--primary-ocean); letter-spacing: 0.5px; }
        .cube-arrow { font-size: 0.65rem; color: var(--text-muted); }

        .back-bar {
            display: flex; align-items: center; gap: 6px; padding: 10px 12px; background: #ffffff;
            border: 1px solid #e2e8f0; border-radius: 10px; margin-bottom: 14px; cursor: pointer;
            font-size: 0.85rem; font-weight: 700; color: var(--primary-ocean);
        }
        .back-bar:active { background-color: #f1f5f9; }
        .sub-details-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }

        .detail-cube-item {
            background: var(--foam-white); border-radius: 12px; border: 1px solid #edf2f7;
            display: flex; flex-direction: column; justify-content: space-between; min-height: 75px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.01); overflow: hidden; grid-column: span 1;
        }
        .detail-cube-item.cash-style { justify-content: space-between; padding: 10px 12px; }
        .detail-cube-header { padding: 10px 12px; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; min-height: 75px; width: 100%; position: relative; }
        .detail-cube-title { font-size: 0.78rem; font-weight: 700; color: var(--text-dark); line-height: 1.2; }
        .detail-cube-footer-row { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: auto; }
        .detail-cube-amount { font-size: 0.92rem; font-weight: 700; color: var(--primary-ocean); }
        .detail-cube-arrow { font-size: 0.6rem; color: var(--text-muted); transition: transform 0.2s ease; }

        .detail-child-drawer { list-style: none; padding: 0; max-height: 0; overflow: hidden; transition: max-height 0.25s ease-out; background-color: #f8fafc; border-top: 1px dashed #edf2f7; }
        .drawer-item { display: flex; flex-direction: column; align-items: flex-start; padding: 6px 12px; gap: 1px; border-bottom: 1px solid #ffffff; }
        .drawer-item:last-child { border-bottom: none; }
        .drawer-acc-name { color: #718093; font-size: 0.7rem; line-height: 1.2; word-break: break-all; }
        .drawer-acc-val { font-weight: 600; color: #2d8bb1; font-size: 0.76rem; }

        .form-card { background: var(--foam-white); border-radius: 14px; padding: 16px 18px; box-shadow: 0 6px 16px var(--sea-shadow); border: 1px solid rgba(26, 95, 122, 0.04); display: none; }
        .form-card.active { display: block; animation: fadeIn 0.3s ease; }
        .form-title { font-size: 1.05rem; color: var(--primary-ocean); margin-bottom: 14px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.78rem; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
        .form-control { width: 100%; padding: 9px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; color: var(--text-dark); background-color: #fafbfc; outline: none; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-submit { width: 100%; padding: 11px; background: linear-gradient(135deg, var(--sunny-amber), #f39c12); color: white; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-top: 6px; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 56px; background-color: rgba(255, 255, 255, 0.94); backdrop-filter: blur(8px); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(0, 0, 0, 0.04); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); text-decoration: none; font-size: 0.7rem; cursor: pointer; background: none; border: none; flex: 1; }
        .nav-item.active { color: var(--primary-ocean); font-weight: 700; }
        .nav-icon { font-size: 1.15rem; margin-bottom: 1px; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <h1>Zhian's 🫧𓇼𓏲*ੈ✩‧₊˚🎐</h1>
        <p>認真賺錢，謹慎花錢，多多存錢，快樂玩耍！☼ಐ </p>
    </header>

    <div class="container">
        
        <div id="view-main-dashboard" class="app-view active">
            <div class="balance-card">
                <h3>🌊 預估總資產 (台幣換算)</h3>
                <button class="privacy-toggle-btn" id="privacyBtn" onclick="togglePrivacy()">🔒 億萬小公主</button>
                <div class="main-total-display">NT$ <span id="grand-total-display">••••••</span></div>
            </div>

            <div class="main-sector-grid">
                <div class="sector-cube-btn" onclick="navigateToDetail('cash', '💵 現金現鈔')">
                    <div class="cube-icon-title"><span class="cube-icon">💵</span><span class="cube-title">現金現鈔</span></div>
                    <div class="cube-footer"><span class="cube-amount" id="cube-total-cash">••••••</span><span class="cube-arrow">➔</span></div>
                </div>
                <div class="sector-cube-btn" onclick="navigateToDetail('traditional', '🏛️ 實體銀行')">
                    <div class="cube-icon-title"><span class="cube-icon">🏛️</span><span class="cube-title">實體銀行</span></div>
                    <div class="cube-footer"><span class="cube-amount" id="cube-total-traditional">••••••</span><span class="cube-arrow">➔</span></div>
                </div>
                <div class="sector-cube-btn" onclick="navigateToDetail('digital', '📱 數位銀行')">
                    <div class="cube-icon-title"><span class="cube-icon">📱</span><span class="cube-title">數位銀行</span></div>
                    <div class="cube-footer"><span class="cube-amount" id="cube-total-digital">••••••</span><span class="cube-arrow">➔</span></div>
                </div>
                <div class="sector-cube-btn" onclick="navigateToDetail('pure', '🌐 純網銀')">
                    <div class="cube-icon-title"><span class="cube-icon">🌐</span><span class="cube-title">純網銀</span></div>
                    <div class="cube-footer"><span class="cube-amount" id="cube-total-pure">••••••</span><span class="cube-arrow">➔</span></div>
                </div>
                <div class="sector-cube-btn" onclick="navigateToDetail('epay', '💳 電子支付')">
                    <div class="cube-icon-title"><span class="cube-icon">💳</span><span class="cube-title">電子支付</span></div>
                    <div class="cube-footer"><span class="cube-amount" id="cube-total-epay">••••••</span><span class="cube-arrow">➔</span></div>
                </div>
                <div class="sector-cube-btn" onclick="navigateToDetail('credit', '🌹 信用卡')">
                    <div class="cube-icon-title"><span class="cube-icon">🌹</span><span class="cube-title">信用卡</span></div>
                    <div class="cube-footer"><span class="cube-amount" id="cube-total-credit">••••••</span><span class="cube-arrow">➔</span></div>
                </div>
                <div class="sector-cube-btn" onclick="navigateToDetail('prepaid', '🎁 儲值卡')">
                    <div class="cube-icon-title"><span class="cube-icon">🎁</span><span class="cube-title">儲值卡</span></div>
                    <div class="cube-footer"><span class="cube-amount" id="cube-total-prepaid">••••••</span><span class="cube-arrow">➔</span></div>
                </div>
                <div class="sector-cube-btn" onclick="navigateToDetail('foreignCash', '✈️ 外幣現鈔')">
                    <div class="cube-icon-title"><span class="cube-icon">✈️</span><span class="cube-title">外幣現鈔</span></div>
                    <div class="cube-footer"><span class="cube-amount" id="cube-total-foreignCash">••••••</span><span class="cube-arrow">➔</span></div>
                </div>
            </div>
        </div>

        <div id="view-sector-detail" class="app-view">
            <div class="back-bar" onclick="backToDashboard()"><span>⬅</span> <span id="detail-page-title">詳細帳戶資料</span></div>
            <div class="sub-details-grid" id="detail-cubes-root"></div>
        </div>

        <div id="panel-transaction" class="form-card">
            <div class="form-title"><span>🏠</span> 日常生活記帳</div>
            <form id="txForm">
                <div class="form-group"><label>日期</label><input type="date" id="txDate" class="form-control" required></div>
                <div class="form-group">
                    <label>交易類型</label>
                    <select id="txType" class="form-control">
                        <option value="支出">支出</option>
                        <option value="收入">收入</option>
                        <option value="轉帳">轉帳</option>
                    </select>
                </div>
                <div class="form-group"><label>扣款帳戶 (出)</label><select id="txAccountOut" class="form-control account-select"></select></div>
                <div class="form-group"><label>存入帳戶 (入)</label><select id="txAccountIn" class="form-control account-select"><option value="">-- 無 --</option></select></div>
                <div class="form-row">
                    <div class="form-group"><label>原始金額</label><input type="number" id="txAmount" class="form-control" placeholder="0" required min="0"></div>
                    <div class="form-group">
                        <label>幣別</label>
                        <select id="txCurrency" class="form-control">
                            <option value="TWD">TWD</option>
                            <option value="USD">USD</option>
                            <option value="JPY">JPY</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>主類別 (大場景)</label>
                    <select id="txMainCat" class="form-control">
                        <option value="生活開銷">生活開銷</option>
                        <option value="旅遊度假">旅遊度假</option>
                        <option value="工作商務">工作商務</option>
                        <option value="投資理財">投資理財</option>
                        <option value="其他">其他</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>子類別 (剛需項目)</label>
                        <select id="txSubCat" class="form-control" onchange="updateDetailOptions()">
                            <option value="食">🍕 食</option>
                            <option value="衣">🛍️ 衣</option>
                            <option value="住">🏠 住</option>
                            <option value="行">🚗 行</option>
                            <option value="育">📚 育</option>
                            <option value="樂">🎡 樂</option>
                            <option value="其他">✨ 其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>細項 (連動選單)</label>
                        <select id="txDetailCat" class="form-control"></select>
                    </div>
                </div>
                
                <div class="form-group"><label>專案 / 對象 (對應K欄)</label><input type="text" id="txProject" class="form-control" placeholder="如: 日常生活、越南旅遊、代墊款"></div>
                <div class="form-group"><label>備註</label><input type="text" id="txNote" class="form-control" placeholder="碎念..."></div>
                <button type="submit" class="btn-submit">每筆花費都很重要！</button>
            </form>
        </div>

        <div id="panel-stock" class="form-card">
            <div class="form-title"><span>⛵</span> 投資理財賺錢錢</div>
            <form id="stockForm">
                <div class="form-row">
                    <div class="form-group"><label>交易日期</label><input type="date" id="stockDate" class="form-control" required></div>
                    <div class="form-group"><label>扣款日期</label><input type="date" id="stockPayDate" class="form-control" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>股票代號</label>
                        <input type="text" id="stockCode" class="form-control" placeholder="如: 2330" required list="stockCodeList" oninput="onStockCodeChange()">
                        <datalist id="stockCodeList"></datalist>
                    </div>
                    <div class="form-group">
                        <label>股票名稱</label>
                        <input type="text" id="stockName" class="form-control" placeholder="如: 台積電" required list="stockNameList" oninput="onStockNameChange()">
                        <datalist id="stockNameList"></datalist>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>交易類型</label>
                        <select id="stockType" class="form-control" onchange="calcStockValues()">
                            <option value="現股買入">現股買入</option>
                            <option value="現股賣出">現股賣出</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>使用券商</label>
                        <select id="stockBroker" class="form-control" onchange="updateBrokerDiscount()">
                            <option value="國泰證券">國泰證券 (樹精靈)</option>
                            <option value="永豐金證券">永豐金證券</option>
                            <option value="其它券商">其它券商</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>股數</label><input type="number" id="stockShares" class="form-control" placeholder="0" required oninput="calcStockValues()"></div>
                    <div class="form-group"><label>單價</label><input type="number" id="stockPrice" class="form-control" step="0.01" placeholder="0.00" required oninput="calcStockValues()"></div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>券商折讓</label>
                        <input type="number" id="stockDiscount" class="form-control" step="0.01" value="0.28" oninput="calcStockValues()">
                    </div>
                    <div class="form-group">
                        <label>交易價款 (H欄)</label>
                        <input type="number" id="stockTotalRaw" class="form-control" readonly style="background-color: #f1f5f9; color: #94a3b8;">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>手續費 (J欄，可手動修改)</label>
                        <input type="number" id="stockFee" class="form-control" required oninput="manualOverrideStockNet()">
                    </div>
                    <div class="form-group">
                        <label>證交稅 (K欄，可手動修改)</label>
                        <input type="number" id="stockTax" class="form-control" required oninput="manualOverrideStockNet()">
                    </div>
                </div>
                <div style="background-color: #f8fafc; padding: 10px; border-radius: 8px; margin-bottom: 12px; font-size: 0.75rem; color: #7f8c8d; line-height: 1.5; text-align: center;">
                    <div style="font-weight: 700; color: var(--primary-ocean); font-size: 0.85rem;">🌊 淨收付總金額 (L欄)：NT$ <span id="lbl-net">0</span></div>
                </div>
                <button type="submit" class="btn-submit">確認此筆交易</button>
            </form>
        </div>

        <div id="panel-loan" class="form-card">
            <div class="form-title"><span>🤝</span> 借貸與代墊款</div>
            <form id="loanForm">
                <div class="form-group"><label>日期</label><input type="date" id="loanDate" class="form-control" required></div>
                
                <div class="form-group">
                    <label>借貸動作</label>
                    <select id="loanType" class="form-control" onchange="updateLoanAccountLabel()">
                        <option value="代墊/借出">代墊 / 借出 (我幫墊錢或拿錢給人)</option>
                        <option value="收到還款">收到還款 (別人把錢還我了！)</option>
                        <option value="借入款項">借入款項 (我跟別人借錢/欠人錢)</option>
                        <option value="我還人款">我還人款 (我把錢還給債主)</option>
                    </select>
                </div>
                
                <div class="form-row">
                    <div class="form-group"><label>對象 (誰)</label><input type="text" id="loanTarget" class="form-control" placeholder="如: 吉米" required></div>
                    <div class="form-group"><label>金額</label><input type="number" id="loanAmount" class="form-control" placeholder="0" required min="1"></div>
                </div>
                
                <div class="form-group">
                    <label id="lbl-loan-account">💸 支付/借出帳戶 (你用什麼幫他墊錢，如：國泰信用卡)</label>
                    <select id="loanAccount" class="form-control account-select"></select>
                </div>
                
                <div class="form-group"><label>備註/細節</label><input type="text" id="loanNote" class="form-control" placeholder="如: 幫墊午餐 137 / 飲料錢"></div>
                
                <button type="submit" class="btn-submit">確認記錄 🌊</button>
            </form>
        </div>

    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchNav('dashboard', this)"><span class="nav-icon">🌊</span><span>總資產</span></button>
        <button class="nav-item" onclick="switchNav('transaction', this)"><span class="nav-icon">🏠</span><span>日常記帳</span></button>
        <button class="nav-item" onclick="switchNav('stock', this)"><span class="nav-icon">📈</span><span>股票交易</span></button>
        <button class="nav-item" onclick="switchNav('loan', this)"><span class="nav-icon">🤝</span><span>借貸追蹤</span></button>
    </div>

    <script>
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbygbG4FxYl4dQloJdMXRw-mxlWDtoAfhNc4h92jM3UlS9azOr88Ot3jTtuAEhKlCGOwnA/exec";
        const PRIVACY_PIN = "3693"; 
        let isUnlocked = false; 

        let globalRawData = { grandTotal: 0, sectorTotals: {} };
        let globalGroupedCachedSectors = {
            cash: [], traditional: {}, digital: {}, pure: {}, epay: {}, credit: {}, prepaid: {}, foreignCash: []
        };

        // 💡 內建台股核心熱門權值股、金控、熱門 ETF 代碼與名稱數據庫
        const STOCK_DATABASE = {
            // 熱門權值與電子
            "2330": "台積電", "2317": "鴻海", "2454": "聯發科", "2308": "台達電", "2382": "廣達",

        // 反向資料庫（用於名稱查代號）
        const STOCK_NAME_LOOKUP = {};
        Object.keys(STOCK_DATABASE).forEach(code => {
            STOCK_NAME_LOOKUP[STOCK_DATABASE[code]] = code;
        });

        // 💡 初始化股票智慧下拉選單提示
        function initStockDataLists() {
            const codeList = document.getElementById("stockCodeList");
            const nameList = document.getElementById("stockNameList");
            if (!codeList || !nameList) return;

            codeList.innerHTML = "";
            nameList.innerHTML = "";

            Object.keys(STOCK_DATABASE).forEach(code => {
                const name = STOCK_DATABASE[code];
                
                // 代號下拉項目
                const optCode = document.createElement("option");
                optCode.value = code;
                optCode.textContent = name;
                codeList.appendChild(optCode);

                // 名称下拉項目
                const optName = document.createElement("option");
                optName.value = name;
                optName.textContent = code;
                nameList.appendChild(optName);
            });
        }

        // 💡 當股票代號欄位輸入時觸發
        function onStockCodeChange() {
            const codeInput = document.getElementById("stockCode").value.trim();
            const nameInput = document.getElementById("stockName");
            if (STOCK_DATABASE[codeInput]) {
                nameInput.value = STOCK_DATABASE[codeInput]; // 自動帶出名稱
            }
        }

        // 💡 當股票名稱欄位輸入時觸發
        function onStockNameChange() {
            const nameInput = document.getElementById("stockName").value.trim();
            const codeInput = document.getElementById("stockCode");
            if (STOCK_NAME_LOOKUP[nameInput]) {
                codeInput.value = STOCK_NAME_LOOKUP[nameInput]; // 自動帶出代號
            }
        }

        const detailMapping = {
            "食": ["早餐", "午餐", "晚餐", "飲料點心", "食材超市", "其他大餐"],
            "衣": ["服飾治裝", "鞋包配件", "隱形眼鏡/美妝", "洗衣服/保養"],
            "住": ["房租", "管理費", "水電瓦斯", "家居生活用品"],
            "行": ["機票", "火車/高鐵票", "計程車/Uber", "捷運/公車", "加油/不扣款車資"],
            "育": ["線上課程", "書籍買書", "展覽講座", "證照考試"],
            "樂": ["旅遊行程/門票", "潛水/水上活動", "電影娛樂", "唱歌聚會"],
            "其他": ["日常雜項", "禮物紅包", "醫療藥品"]
        };

        function updateDetailOptions() {
            const subCatVal = document.getElementById("txSubCat").value;
            const detailSelect = document.getElementById("txDetailCat");
            if (!detailSelect) return;
            detailSelect.innerHTML = "";
            
            const options = detailMapping[subCatVal] || ["一般細項"];
            options.forEach(opt => {
                const o = document.createElement("option");
                o.value = opt;
                o.textContent = opt;
                detailSelect.appendChild(o);
            });
        }

        function updateLoanAccountLabel() {
            const type = document.getElementById("loanType").value;
            const lbl = document.getElementById("lbl-loan-account");
            
            if (type === "代墊/借出") {
                lbl.textContent = "💸 支付/借出帳戶 (你用什麼幫他墊錢，如：富邦信用卡)";
            } else if (type === "收到還款") {
                lbl.textContent = "💰 存入/收款帳戶 (他還你錢要存去哪，如：LINE Pay Money)";
            } else if (type === "借入款項") {
                lbl.textContent = "💰 拿到的現金/存入帳戶 (錢借進來放哪)";
            } else if (type === "我還人款") {
                lbl.textContent = "💸 支付/還款帳戶 (你拿什麼帳戶去還別人錢)";
            }
        }

        function togglePrivacy() {
            if (!isUnlocked) {
                const userInput = prompt("🔒 請輸入驗證碼以解鎖金額顯示：");
                if (userInput === PRIVACY_PIN) {
                    isUnlocked = true;
                    document.getElementById("privacyBtn").textContent = "👁️ 多賺點錢好咪";
                    renderAllAmounts(); 
                } else if (userInput !== null) { alert("❌ 驗證碼錯誤。"); }
            } else {
                isUnlocked = false;
                document.getElementById("privacyBtn").textContent = "🔒 億萬小公主";
                renderAllAmounts(); 
                if(document.getElementById('view-sector-detail').classList.contains('active')) {
                    const currentTitle = document.getElementById('detail-page-title').textContent;
                    let currentKey = "cash";
                    if(currentTitle.includes("實體")) currentKey = "traditional";
                    else if(currentTitle.includes("數位")) currentKey = "digital";
                    else if(currentTitle.includes("純網")) currentKey = "pure";
                    else if(currentTitle.includes("電子")) currentKey = "epay";
                    else if(currentTitle.includes("信用")) currentKey = "credit";
                    else if(currentTitle.includes("儲值")) currentKey = "prepaid";
                    else if(currentTitle.includes("外幣")) currentKey = "foreignCash";
                    navigateToDetail(currentKey, currentTitle);
                }
            }
        }

        function renderAllAmounts() {
            document.getElementById("grand-total-display").textContent = isUnlocked ? globalRawData.grandTotal.toLocaleString('zh-TW') : "••••••";
            document.getElementById("cube-total-cash").textContent = isUnlocked ? (globalRawData.sectorTotals["現金現鈔"] || 0).toLocaleString('zh-TW') : "••••••";
            document.getElementById("cube-total-traditional").textContent = isUnlocked ? (globalRawData.sectorTotals["實體銀行"] || 0).toLocaleString('zh-TW') : "••••••";
            document.getElementById("cube-total-digital").textContent = isUnlocked ? (globalRawData.sectorTotals["數位銀行"] || 0).toLocaleString('zh-TW') : "••••••";
            document.getElementById("cube-total-pure").textContent = isUnlocked ? (globalRawData.sectorTotals["純網銀"] || 0).toLocaleString('zh-TW') : "••••••";
            document.getElementById("cube-total-epay").textContent = isUnlocked ? (globalRawData.sectorTotals["電子支付"] || 0).toLocaleString('zh-TW') : "••••••";
            document.getElementById("cube-total-credit").textContent = isUnlocked ? (globalRawData.sectorTotals["信用卡"] || 0).toLocaleString('zh-TW') : "••••••";
            document.getElementById("cube-total-prepaid").textContent = isUnlocked ? (globalRawData.sectorTotals["儲值卡"] || 0).toLocaleString('zh-TW') : "••••••";
            document.getElementById("cube-total-foreignCash").textContent = isUnlocked ? (globalRawData.sectorTotals["外幣現鈔"] || 0).toLocaleString('zh-TW') : "••••••";
        }

        function toggleDetailDrawer(drawerId) {
            const list = document.getElementById("drawer-list-" + drawerId);
            const arrow = document.getElementById("drawer-arrow-" + drawerId);
            if (list.style.maxHeight === "0px" || !list.style.maxHeight) {
                list.style.maxHeight = "400px"; arrow.style.transform = "rotate(90deg)"; 
            } else {
                list.style.maxHeight = "0px"; arrow.style.transform = "rotate(0deg)"; 
            }
        }

        function navigateToDetail(sectorKey, pageTitle) {
            document.getElementById('view-main-dashboard').classList.remove('active');
            document.getElementById('detail-page-title').textContent = pageTitle;
            
            const root = document.getElementById('detail-cubes-root');
            root.innerHTML = "";
            const sourceData = globalGroupedCachedSectors[sectorKey];

            if (sectorKey === 'cash' || sectorKey === 'foreignCash') {
                const arr = sourceData || [];
                if(arr.length === 0) {
                    root.innerHTML = '<p style="color:#a0aec0; font-size:0.8rem; padding:20px; text-align:center; grid-column: span 2;">無紀錄</p>';
                } else {
                    arr.forEach(acc => {
                        root.innerHTML += `
                            <div class="detail-cube-item cash-style">
                                <span class="detail-cube-title">${acc.name}</span>
                                <span class="detail-cube-amount">${isUnlocked ? acc.formattedBalance : "••••••"} <small class="detail-cube-currency">(${acc.currency})</small></span>
                            </div>`;
                    });
                }
            } 
            else {
                const groupObj = sourceData || {};
                const keys = Object.keys(groupObj);
                if(keys.length === 0) {
                    root.innerHTML = '<p style="color:#a0aec0; font-size:0.8rem; padding:20px; text-align:center; grid-column: span 2;">無紀錄</p>';
                } else {
                    let idx = 0;
                    for (const bankName in groupObj) {
                        const bankPack = groupObj[bankName];
                        const totalSumString = isUnlocked ? bankPack.bankTotal.toLocaleString('zh-TW') : "••••••";
                        
                        const itemWrapper = document.createElement("div");
                        itemWrapper.className = "detail-cube-item";
                        itemWrapper.innerHTML = `
                            <div class="detail-cube-header" onclick="toggleDetailDrawer(${idx})">
                                <span class="detail-cube-title">${bankName}</span>
                                <div class="detail-cube-footer-row">
                                    <span class="detail-cube-amount">${totalSumString}</span>
                                    <span class="detail-cube-arrow" id="drawer-arrow-${idx}">▶</span>
                                </div>
                            </div>
                        `;
                        
                        const subUl = document.createElement("ul");
                        subUl.className = "detail-child-drawer";
                        subUl.id = "drawer-list-" + idx;
                        subUl.style.maxHeight = "0px";
                        
                        bankPack.subAccounts.forEach(sub => {
                            subUl.innerHTML += `
                                <li class="drawer-item">
                                    <span class="drawer-acc-name">${sub.name}</span>
                                    <span class="drawer-acc-val">${isUnlocked ? sub.val : "••••••"} <small style="font-size:0.6rem; font-weight:400; color:#a0aec0;">(${sub.currency})</small></span>
                                </li>`;
                        });
                        itemWrapper.appendChild(subUl);
                        root.appendChild(itemWrapper);
                        idx++;
                    }
                }
            }
            document.getElementById('view-sector-detail').classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function backToDashboard() {
            document.getElementById('view-sector-detail').classList.remove('active');
            document.getElementById('view-main-dashboard').classList.add('active');
        }

        function switchNav(target, element) {
            document.querySelectorAll('.form-card').forEach(card => card.classList.remove('active'));
            document.querySelectorAll('.app-view').forEach(view => view.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            if (target === 'dashboard') { document.getElementById('view-main-dashboard').classList.add('active'); } 
            else { document.getElementById('panel-' + target).classList.add('active'); }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.addEventListener("DOMContentLoaded", () => { 
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('txDate').value = today;
            document.getElementById('stockDate').value = today;
            document.getElementById('stockPayDate').value = today; 
            document.getElementById('loanDate').value = today;
            updateDetailOptions();
            updateBrokerDiscount(); 
            initStockDataLists(); // 💡 額外加裝：啟動股票下拉資料庫
            fetchAccounts(); 
            setupFormSubmissions();
        });

        function fetchAccounts() {
            const selectElements = document.querySelectorAll(".account-select");
            fetch(GAS_API_URL)
                .then(response => response.json())
                .then(res => {
                    if (res.status === "success") {
                        const accounts = res.data;
                        globalGroupedCachedSectors = { cash: [], traditional: {}, digital: {}, pure: {}, epay: {}, credit: {}, prepaid: {}, foreignCash: [] };
                        selectElements.forEach(select => {
                            select.innerHTML = select.id === "txAccountIn" ? '<option value="">-- 無 (非轉帳) --</option>' : '';
                        });

                        let grandTotalTWD = 0;
                        const sectorTotals = { "現金現鈔": 0, "實體銀行": 0, "數位銀行": 0, "純網銀": 0, "電子支付": 0, "信用卡": 0, "儲值卡": 0, "外幣現鈔": 0 };

                        accounts.forEach(acc => {
                            selectElements.forEach(select => {
                                const option = document.createElement("option"); option.value = acc.name;
                                option.textContent = `${acc.name} (${acc.currency})`; select.appendChild(option);
                            });

                            const balanceNum = Number(acc.balance) || 0;
                            const formattedVal = balanceNum.toLocaleString('zh-TW');
                            const sheetType = acc.type ? acc.type.trim() : "實體銀行";
                            const excelBankName = acc.bank ? acc.bank.trim() : "其它";

                            grandTotalTWD += balanceNum; 
                            if (sectorTotals.hasOwnProperty(sheetType)) { sectorTotals[sheetType] += balanceNum; }
                            const accPack = { name: acc.name, formattedBalance: formattedVal, currency: acc.currency };
                            
                            if (sheetType === "現金現鈔") globalGroupedCachedSectors.cash.push(accPack);
                            else if (sheetType === "外幣現鈔") globalGroupedCachedSectors.foreignCash.push(accPack);
                            else {
                                let cacheTargetObj = globalGroupedCachedSectors.traditional;
                                if (sheetType === "數位銀行") cacheTargetObj = globalGroupedCachedSectors.digital;
                                else if (sheetType === "純網銀") cacheTargetObj = globalGroupedCachedSectors.pure;
                                else if (sheetType === "電子支付") cacheTargetObj = globalGroupedCachedSectors.epay;
                                else if (sheetType === "信用卡") cacheTargetObj = globalGroupedCachedSectors.credit;
                                else if (sheetType === "儲值卡") cacheTargetObj = globalGroupedCachedSectors.prepaid;

                                if (!cacheTargetObj[excelBankName]) cacheTargetObj[excelBankName] = { bankTotal: 0, subAccounts: [] };
                                cacheTargetObj[excelBankName].bankTotal += balanceNum;
                                cacheTargetObj[excelBankName].subAccounts.push({ name: acc.name, val: formattedVal, currency: acc.currency });
                            }
                        });
                        globalRawData.grandTotal = grandTotalTWD;
                        globalRawData.sectorTotals = sectorTotals;
                        renderAllAmounts();
                    }
                })
                .catch(err => console.error("Error:", err));
        }

        function setupFormSubmissions() {
            document.getElementById("txForm").addEventListener("submit", function(e) {
                e.preventDefault();
                const submitBtn = this.querySelector(".btn-submit");
                const originalText = submitBtn.textContent;
                submitBtn.textContent = "乖寶寶有記帳👶🏻... 🫶🏻"; submitBtn.disabled = true;

                const subCat = document.getElementById("txSubCat").value;
                const detailCat = document.getElementById("txDetailCat").value;

                const payload = {
                    action: "addTransaction",
                    data: {
                        date: document.getElementById("txDate").value,
                        type: document.getElementById("txType").value,
                        accountOut: document.getElementById("txAccountOut").value,
                        accountIn: document.getElementById("txAccountIn").value,
                        amount: Number(document.getElementById("txAmount").value),
                        currency: document.getElementById("txCurrency").value,
                        mainCategory: document.getElementById("txMainCat").value,
                        subCategory: `${subCat}-${detailCat}`, 
                        project: document.getElementById("txProject").value, 
                        note: document.getElementById("txNote").value
                    }
                };
                sendData(payload, this, originalText, submitBtn);
            });

            document.getElementById("stockForm").addEventListener("submit", function(e) {
                e.preventDefault();
                const submitBtn = this.querySelector(".btn-submit");
                const originalText = submitBtn.textContent;
                submitBtn.textContent = "乖寶寶有記帳👶🏻... 🫶🏻"; submitBtn.disabled = true;

                const totalRaw = Number(document.getElementById("stockTotalRaw").value) || 0;
                const fee = Number(document.getElementById("stockFee").value) || 0;
                const tax = Number(document.getElementById("stockTax").value) || 0;
                const type = document.getElementById("stockType").value;
                const netAmount = (type === "現股買入") ? (totalRaw + fee) : (totalRaw - fee - tax);

                const payload = {
                    action: "addStock",
                    data: {
                        date: document.getElementById("stockDate").value,
                        payDate: document.getElementById("stockPayDate").value,
                        stockCode: document.getElementById("stockCode").value,
                        stockName: document.getElementById("stockName").value,
                        type: type,
                        shares: Number(document.getElementById("stockShares").value),
                        price: Number(document.getElementById("stockPrice").value),
                        discount: Number(document.getElementById("stockDiscount").value),
                        totalRaw: totalRaw,
                        fee: fee,
                        tax: tax,
                        netAmount: netAmount,
                        broker: document.getElementById("stockBroker").value
                    }
                };
                sendData(payload, this, originalText, submitBtn);
            });

            document.getElementById("loanForm").addEventListener("submit", function(e) {
                e.preventDefault();
                const submitBtn = this.querySelector(".btn-submit");
                const originalText = submitBtn.textContent;
                submitBtn.textContent = "乖寶寶有記帳👶🏻... 🫶🏻"; submitBtn.disabled = true;

                const payload = {
                    action: "addLoan",
                    data: {
                        date: document.getElementById("loanDate").value, 
                        type: document.getElementById("loanType").value,
                        target: document.getElementById("loanTarget").value, 
                        amount: Number(document.getElementById("loanAmount").value), 
                        account: document.getElementById("loanAccount").value,
                        note: document.getElementById("loanNote").value
                    }
                };
                sendData(payload, this, originalText, submitBtn);
            });
        }

        function sendData(payload, formEl, originalText, submitBtn) {
            fetch(GAS_API_URL, { method: "POST", body: JSON.stringify(payload) })
            .then(response => response.json())
            .then(res => {
                if (res.status === "success") {
                    alert("✨ 紀錄成功！繼續加油！"); 
                    formEl.reset();
                    const d = new Date().toISOString().split('T')[0];
                    document.getElementById('txDate').value = d;
                    document.getElementById('stockDate').value = d;
                    document.getElementById('stockPayDate').value = d;
                    document.getElementById('loanDate').value = d;
                    updateDetailOptions();
                    updateBrokerDiscount();
                    updateLoanAccountLabel(); 
                    fetchAccounts(); 
                    switchNav('dashboard', document.querySelectorAll('.nav-item')[0]);
                } else { alert("❌ 寫入失敗: " + res.message); }
            })
            .catch(err => { alert("❌ 網路發生錯誤。"); })
            .finally(() => { submitBtn.textContent = originalText; submitBtn.disabled = false; });
        }

        function updateBrokerDiscount() {
            const broker = document.getElementById("stockBroker").value;
            const discountInput = document.getElementById("stockDiscount");
            if (broker === "國泰證券") discountInput.value = "0.28";
            else if (broker === "永豐金證券") discountInput.value = "0.60";
            calcStockValues();
        }

        function calcStockValues() {
            const shares = Number(document.getElementById("stockShares").value) || 0;
            const price = Number(document.getElementById("stockPrice").value) || 0;
            const discount = Number(document.getElementById("stockDiscount").value) || 1;
            const type = document.getElementById("stockType").value;

            const totalRaw = Math.round(shares * price);
            document.getElementById("stockTotalRaw").value = totalRaw;
            
            let fee = Math.round(totalRaw * 0.001425 * discount);
            if (totalRaw > 0 && fee < 20) fee = 20; 
            document.getElementById("stockFee").value = fee;

            const tax = (type === "現股賣出") ? Math.round(totalRaw * 0.003) : 0;
            document.getElementById("stockTax").value = tax;

            manualOverrideStockNet();
        }

        function manualOverrideStockNet() {
            const totalRaw = Number(document.getElementById("stockTotalRaw").value) || 0;
            const fee = Number(document.getElementById("stockFee").value) || 0;
            const tax = Number(document.getElementById("stockTax").value) || 0;
            const type = document.getElementById("stockType").value;

            const netAmount = (type === "現股買入") ? (totalRaw + fee) : (totalRaw - fee - tax);
            document.getElementById("lbl-net").textContent = netAmount.toLocaleString('zh-TW');
        }
    </script>
